defaults:
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

seed: 0
ds_path: null
tokens_params_ratio: 20 # chinchilla scaling
num_tokens_train: null
log_every_tokens: 1_000_000
log_metrics_per_step: false
eval_every_steps: 100
num_tokens_valid: 20_000_000
wandb_project: 'picodo-loss-spikes'
wandb_mode: 'disabled'
run_name: null
num_tp_devices: 1 # optional tensor parallelism
log_logit_grad_stats: false
log_logit_grad_scaling_stats: false

model:
  D: null # model/embed/qkv dim
  L: null # num. block layers
  H: 128 # head dimension
  F: ${mul:4, ${model.D}} # FF inner dimension = 4 x embed dim.
  N: ${floordiv:${model.D}, ${model.H}} # num. attention heads
  T: null # context/sequence length
  V: null # vocab size -> must match dataset tokenizer!
  activ_dtype: 'bfloat16'
  use_flash_attn: true
  use_qk_norm: true
  elementwise_attn_output_gate: false
  final_hidden_mean_centering: false
  alpha: 1.0
  # use_qk_norm: [0, 1, 2, 3, 4, 9, 10, 11]
  
opt:
  batch_size: 256
  peak_lr: 0.01
  warmup_frac: 0.05
  b1: 0.9
  b2: 0.95
  weight_decay: 1e-4
  exclude_input_embedding_weight_decay: false
  clip_by_global_norm: 1.0
  use_z_loss: false
  eps: 1e-8
  # When true, subtracts the mean row from token_embed_out.embedding
  # after every optimizer step (see train.py::train_step_*_centered +
  # model_lib.center_output_embeddings). Architectural enforcement of
  # mu_W = 0. Off by default.
  mucentering: false
  # Per-group Adam epsilon: when set, token_embed_out.embedding (W_U) uses
  # this eps and every other parameter keeps `eps` above. Leave null to use
  # a single global eps (existing behavior).
  unembed_eps: null
  loss_skip:
    enabled: false
    warmup_steps: 1000
    window_size: 1000
    min_history: 256
    z_soft: 5.0
    z_hard: 8.0
    soft_weight: 1.0
    eps: 1e-6
    use_log_loss: false
    abs_hard: null
  loss_cap:
    enabled: false
    soft_cap: 30.0
    warmup_steps: 0
  b2_anneal:
    enabled: false
    start: 0.99
    end: 0.95

checkpoint:
  turn_on: true
  workdir: ""
  checkpoint_every_steps: 2000
  max_to_keep: 100
  start_step: null # pick a specific checkpoint to start off from
  checkpoint_steps: null

diagnostics:
  end_step: null # to specific end step
  save_raw_losses: false
  collect_qkv_stats: false

# Per-step per-tensor cosine(W_t, W_{t-1}). Off by default.
cosine:
  enabled: false

# Per-step top-K Hessian eigenvalues + per-tensor eigenvector mass.
# Off by default. K=5 means 5 HVPs per logged step (forward-over-reverse).
hessian:
  enabled: false
  k: 5
  every_n_steps: 1
  param_filter: null  # regex over param paths; null = all params
  use_remat: true  # gradient checkpoint each transformer block during HVP (required for full-Hessian to fit in HBM)

# Per-step mu_W (flat-direction) tracking + spectral health of W_U.
# Off by default. Negligible cost (one 768x768 eigh per step).
wu_diagnostics:
  enabled: false

# Tier-1 v_t evidence diagnostics: per-row sqrt(v_hat) quantiles,
# fraction-below-eps, frequency-bucketed means, and Spearman rho between
# log token frequency and log row-v. Computed on both token_embed_out
# (W_U) and token_embed_in (W_E). Requires a precomputed token-frequency
# .npy (see compute_token_frequencies.py). Off by default.
v_t_diagnostics:
  enabled: false
  freq_path: null  # e.g. ~/datasets/fineweb_gpt2_freqs.npy
  num_buckets: 10
