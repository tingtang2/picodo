defaults:
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

seed: 0
ds_path: null
tokens_params_ratio: 20 # chinchilla scaling
num_tokens_train: null
log_every_tokens: 1_000_000
log_metrics_per_step: false
num_tokens_valid: 20_000_000
wandb_project: 'picodo-loss-spikes'
wandb_mode: 'disabled'
run_name: null
num_tp_devices: 1 # optional tensor parallelism
log_logit_grad_stats: false
log_logit_grad_scaling_stats: false

model:
  D: null # model/embed/qkv dim
  L: null # num. block layers
  H: 128 # head dimension
  F: ${mul:4, ${model.D}} # FF inner dimension = 4 x embed dim.
  N: ${floordiv:${model.D}, ${model.H}} # num. attention heads
  T: null # context/sequence length
  V: null # vocab size -> must match dataset tokenizer!
  activ_dtype: 'bfloat16'
  use_flash_attn: true
  use_qk_norm: true
  elementwise_attn_output_gate: false
  final_hidden_mean_centering: false
  
opt:
  batch_size: 8
  peak_lr: 0.002
  warmup_frac: 0.05
  b1: 0.9
  b2: 0.999
  weight_decay: 0.02
  exclude_input_embedding_weight_decay: false
  loss_skip:
    enabled: false
    warmup_steps: 1000
    window_size: 1000
    min_history: 256
    z_soft: 5.0
    z_hard: 8.0
    soft_weight: 1.0
    eps: 1e-6
    use_log_loss: false
    abs_hard: null
  loss_cap:
    enabled: false
    soft_cap: 30.0
    warmup_steps: 0

# Per-step per-tensor cosine(W_t, W_{t-1}). Off by default.
cosine:
  enabled: false

# Per-step top-K Hessian eigenvalues + per-tensor eigenvector mass.
# Off by default. K=5 means 5 HVPs per logged step (forward-over-reverse).
hessian:
  enabled: false
  k: 5
  every_n_steps: 1
  param_filter: null  # regex over param paths; null = all params
