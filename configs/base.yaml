defaults:
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

seed: 0
ds_path: null
tokens_params_ratio: 20 # chinchilla scaling
num_tokens_train: null
log_every_tokens: 1_000_000
log_metrics_per_step: false
log_metrics_per_step_full: false
log_output_embedding_group_metrics: true
num_tokens_valid: 20_000_000
wandb_project: 'picodo-loss-spikes'
wandb_mode: 'disabled'
run_name: null
num_tp_devices: 1 # optional tensor parallelism
log_logit_grad_stats: false
log_logit_grad_scaling_stats: false

model:
  D: null # model/embed/qkv dim
  L: null # num. block layers
  H: 128 # head dimension
  F: ${mul:4, ${model.D}} # FF inner dimension = 4 x embed dim.
  N: ${floordiv:${model.D}, ${model.H}} # num. attention heads
  T: null # context/sequence length
  V: null # vocab size -> must match dataset tokenizer!
  activ_dtype: 'bfloat16'
  use_flash_attn: true
  use_qk_norm: true
  rmsnorm_use_scale: false
  elementwise_attn_output_gate: false
  final_hidden_mean_centering: false
  # Match Lingua's Megatron path: N(0, 0.01) input projections and
  # N(0, 0.01 / sqrt(2 * L)) residual output projections.
  megatron_init: false
  init_base_std: 0.01
  
opt:
  batch_size: 8
  peak_lr: 0.002
  warmup_frac: 0.05
  b1: 0.9
  b2: 0.999
  b2_cosine_anneal:
    enabled: false
    final_b2: 0.999
  weight_decay: 0.02
  exclude_input_embedding_weight_decay: false
  lm_head_optimizer:
    type: adamw # one of: adamw, sgd_momentum, adamw_b1, row_oblique, column_oblique
    peak_lr: ${opt.peak_lr} # optional LM-head-specific peak LR; defaults to the global optimizer peak LR
    momentum: 0.9 # used by sgd_momentum, row_oblique, and column_oblique
    nesterov: false # used by sgd_momentum
    target_rms: 1.0 # used by row_oblique/column_oblique: target norm on the notebook's scaled oblique manifold
    direction_target_rms: 1.0 # used by row_oblique/column_oblique: RMS of the tangent-space update direction
    target_rms_from_random_init: false # if true, initialize the fixed oblique target_rms from the random LM-head's average per-row RMS before oblique renormalization
    learn_target_rms: false # if true, learn a positive scalar multiplier on top of the unit oblique LM head
    initial_target_rms: ${opt.lm_head_optimizer.target_rms} # initial value for the learned target rms scalar
    initial_target_rms_from_random_init: false # if true, initialize the learned scalar from the random LM-head's average per-row RMS before oblique renormalization
    eps: ${opt.eps} # used by row_oblique/column_oblique retraction/normalization
  lm_head_gradient_centering: 'off' # one of: off, pre, post
  lm_head_weighted_columnwise_gradient_centering: 'off' # one of: off, pre, post
  lm_head_adaptive_tuc:
    enabled: false
    lambda_scale: 0.05
    eps: ${opt.eps}
  loss_skip:
    enabled: false
    warmup_steps: 1000
    window_size: 1000
    min_history: 256
    z_soft: 5.0
    z_hard: 8.0
    soft_weight: 1.0
    eps: 1e-6
    use_log_loss: false
    abs_hard: null
  loss_cap:
    enabled: false
    soft_cap: 30.0
    warmup_steps: 0
  loss_rewrite:
    enabled: false
    replacement_token_id: 11
    warmup_steps: 1000
    window_size: 1000
    min_history: 256
    z_hard: 8.0
    eps: 1e-6
    use_log_loss: false
